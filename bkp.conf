# Minecraft Docker Backup Configuration
# ======================================

# Timeout for graceful server shutdown (seconds)
RCON_STOP_TIMEOUT=30

# Keep a maximum of N backup copies (keeps the most recent)
MAX_BACKUP_COPIES=10

# Minimum disk space before backup (MB)
MIN_DISK_SPACE_MB=1000

# 10MB - rotate log when reaching this size
LOG_SIZE_LIMIT=10485760

# Number of attempts to start container
CONTAINER_CHECK_RETRIES=3
